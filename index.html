<body>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="sound-hint">Tap to enable sound</div>
</div>

<script>
(function(){
'use strict';

// ── Canvas setup ──────────────────────────────────────────────────────────────
const wrap = document.getElementById('game-wrap');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const soundHint = document.getElementById('sound-hint');

let W = 0, H = 0, DPR = 1;

function resize() {
  const rect = wrap.getBoundingClientRect();
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = rect.width;
  H = rect.height;
  canvas.width = Math.round(W * DPR);
  canvas.height = Math.round(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null;
let audioEnabled = false;

function initAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioEnabled = true;
    soundHint.style.display = 'none';
  } catch(e) { audioEnabled = false; }
}

function playOsc(type, freq, gain, dur, freqEnd) {
  if (!audioEnabled || !audioCtx) return;
  try {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, audioCtx.currentTime + dur);
    g.gain.setValueAtTime(gain, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur + 0.01);
  } catch(e) {}
}

function playNoise(freqCenter, gain, dur) {
  if (!audioEnabled || !audioCtx) return;
  try {
    const len = Math.ceil(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'bandpass';
    flt.frequency.value = freqCenter;
    flt.Q.value = 0.8;
    const g = audioCtx.createGain();
    src.buffer = buf;
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(gain, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    src.start(); src.stop(audioCtx.currentTime + dur + 0.01);
  } catch(e) {}
}

function sfxBeat(isSurge) {
  playOsc('square', isSurge ? 1400 : 800, isSurge ? 0.18 : 0.12, 0.04);
}
function sfxHit(quality) {
  // quality: 0=ok, 1=perfect, 2=good
  const freqs = [330, 660, 440];
  playOsc('triangle', freqs[quality], 0.2, 0.08, freqs[quality] * 1.3);
  playNoise(1200, 0.15, 0.1);
}
function sfxMiss() {
  playOsc('sawtooth', 160, 0.25, 0.18, 80);
}
function sfxBoom() {
  if (!audioEnabled || !audioCtx) return;
  try {
    const dur = 0.9;
    const len = Math.ceil(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.5);
    }
    const src = audioCtx.createBufferSource();
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = 350;
    const g = audioCtx.createGain();
    src.buffer = buf;
    src.connect(flt); flt.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.9, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    src.start(); src.stop(audioCtx.currentTime + dur + 0.01);
    // Low rumble
    playOsc('sawtooth', 60, 0.3, 0.4, 30);
  } catch(e) {}
}
function sfxSurgeWarning() {
  [600, 900, 1200].forEach((f, i) => {
    setTimeout(() => playOsc('sawtooth', f, 0.18, 0.1), i * 100);
  });
}

// ── URL params / friend score ─────────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const friendScore = parseInt(urlParams.get('score') || '0', 10) || 0;

// ── LocalStorage ──────────────────────────────────────────────────────────────
function lsGet(k, def) { return parseInt(localStorage.getItem(k) || String(def), 10) || def; }
function lsSet(k, v)   { try { localStorage.setItem(k, String(v)); } catch(e) {} }

const LS_BEST       = 'sp2_best';
const LS_BEST_COMBO = 'sp2_best_combo';
const LS_BEST_HEAT  = 'sp2_best_heat';

// ── Timing constants ──────────────────────────────────────────────────────────
const NUM_VALVES    = 3;
const BASE_BPM      = 90;
const MAX_BPM       = 135;
const BEAT_WIN      = 0.32;   // fraction of beat interval on each side of beat
const SURGE_BEATS   = 8;
const SURGE_COOL    = 14;     // beats between surges

// ── State ─────────────────────────────────────────────────────────────────────
let state      = 'start';  // 'start' | 'playing' | 'gameover'
let score      = 0;
let pressure   = 0;   // 0..1
let heat       = 0;   // 0..1
let combo      = 0;
let maxCombo   = 0;
let bpm        = BASE_BPM;
let beatMs     = 60000 / bpm;
let beatCount  = 0;
let diffLevel  = 0;   // 0..1

let inSurge         = false;
let surgeBeatsLeft  = 0;
let surgeCooldown   = SURGE_COOL;

let activeValve     = 0;
let valveFlash      = 0;   // 1..0 decay
let beatPending     = false;
let beatPendingAt   = 0;   // ms timestamp
let tapConsumed     = false;
let nextBeatAt      = 0;
let lastBeatAt      = 0;

let particles  = [];
let rings      = [];   // telegraph rings
let shakeAmt   = 0;
let shakeX     = 0, shakeY = 0;
let tapFlash   = 0;   // full-screen flash on hit
let gameOverT  = 0;   // timer in ms since gameover
let goFlash    = 0;   // orange flash intensity

let hue        = 30;
let copiedMsg  = false;
let copiedTimer = 0;

let shareBtnRect = null;  // { x,y,w,h } in canvas coords

// ── Helpers ───────────────────────────────────────────────────────────────────
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function txt(text, x, y, size, color, align, shadow) {
  ctx.font = `bold ${size}px 'Courier New', monospace`;
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  if (shadow) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillText(text, x + 2, y + 2);
  }
  ctx.fillStyle = color;
  ctx.fillText(text, x, y);
}

function valvePos(i) {
  return { x: W / (NUM_VALVES + 1) * (i + 1), y: H * 0.56 };
}

// ── Particle system ───────────────────────────────────────────────────────────
function spawnParticles(x, y, count, h, speed, life) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = speed * (0.3 + Math.random() * 0.9);
    particles.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: life, maxLife: life,
      hue: h + (Math.random() - 0.5) * 50,
      sz: 2 + Math.random() * 5,
      kind: Math.random() < 0.5 ? 'dot' : 'sq'
    });
  }
}

function spawnSteam(x, y, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x: x + (Math.random() - 0.5) * 24,
      y: y + (Math.random() - 0.5) * 8,
      vx: (Math.random() - 0.5) * 1.5,
      vy: -1.5 - Math.random() * 3.5,
      life: 0.7 + Math.random() * 0.5,
      maxLife: 1.2,
      hue: 185 + Math.random() * 55,
      sz: 5 + Math.random() * 10,
      kind: 'steam'
    });
  }
}

// ── Game reset ────────────────────────────────────────────────────────────────
function resetGame() {
  score       = 0;
  pressure    = 0;
  heat        = 0;
  combo       = 0;
  maxCombo    = 0;
  bpm         = BASE_BPM;
  beatMs      = 60000 / bpm;
  beatCount   = 0;
  diffLevel   = 0;
  inSurge     = false;
  surgeBeatsLeft = 0;
  surgeCooldown  = SURGE_COOL;
  activeValve = Math.floor(Math.random() * NUM_VALVES);
  valveFlash  = 0;
  beatPending = false;
  tapConsumed = false;
  particles   = [];
  rings       = [];
  shakeAmt    = 0;
  tapFlash    = 0;
  goFlash     = 0;
  gameOverT   = 0;
  hue         = 30;
  shareBtnRect = null;

  const now = performance.now();
  lastBeatAt  = now;
  nextBeatAt  = now + beatMs;
}

// ── Beat events ───────────────────────────────────────────────────────────────
function onBeat(now) {
  // Miss check: previous beat was never tapped
  if (beatPending && !tapConsumed) applyMiss();

  beatCount++;
  diffLevel = Math.min(1, beatCount / 80);
  hue = (hue + 2) % 360;

  // Surge management
  if (inSurge) {
    surgeBeatsLeft--;
    if (surgeBeatsLeft <= 0) { inSurge = false; surgeCooldown = SURGE_COOL; }
  } else {
    surgeCooldown--;
    if (surgeCooldown <= 0 && beatCount > 16) {
      inSurge = true;
      surgeBeatsLeft = SURGE_BEATS;
      sfxSurgeWarning();
    }
  }

  // Ramp BPM
  bpm   = BASE_BPM + diffLevel * (MAX_BPM - BASE_BPM) + (inSurge ? 8 : 0);
  beatMs = 60000 / bpm;

  activeValve = Math.floor(Math.random() * NUM_VALVES);
  valveFlash  = 1;
  beatPending = true;
  tapConsumed = false;
  beatPendingAt = now;
  lastBeatAt  = now;
  nextBeatAt  = now + beatMs;

  // Telegraph ring
  const vp = valvePos(activeValve);
  rings.push({ x: vp.x, y: vp.y - 58, r: 8, alpha: 1 });

  sfxBeat(inSurge);
  spawnSteam(vp.x, vp.y - 30, inSurge ? 7 : 3);
}

function applyHit(quality) {  // 0=ok, 1=perfect, 2=good
  tapConsumed = true;
  beatPending = false;
  const mult = 1 + Math.floor(heat * 4);
  const pts  = [30, 100, 60][quality] * mult;
  score += pts;
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  heat     = Math.min(1, heat + 0.07);
  pressure = Math.max(0, pressure - (inSurge ? 0.03 : 0.055));
  tapFlash = 0.7;
  const vp = valvePos(activeValve);
  spawnParticles(vp.x, vp.y - 50, quality === 1 ? 18 : 12,
    hue + quality * 40, inSurge ? 7 : 5, 0.75);
  sfxHit(quality);
}

function applyMiss() {
  combo = 0;
  const pen = (inSurge ? 0.20 : 0.13) * (1 + heat * 1.4);
  pressure = Math.min(1, pressure + pen);
  heat     = Math.max(0, heat - 0.14);
  beatPending = false;
  tapConsumed = true;
  sfxMiss();
  if (pressure >= 1) triggerGameOver();
}

function applyEarly() {
  combo = 0;
  pressure = Math.min(1, pressure + 0.06);
  heat     = Math.max(0, heat - 0.05);
  sfxMiss();
  if (pressure >= 1) triggerGameOver();
}

function triggerGameOver() {
  state = 'gameover';
  gameOverT = 0;
  goFlash   = 1;
  shakeAmt  = 22;
  sfxBoom();
  spawnParticles(W / 2, H / 2, 70, hue, 14, 1.6);
  spawnParticles(W / 2, H / 2, 40, hue + 130, 8, 1.2);
  const best = lsGet(LS_BEST, 0);
  if (score > best) lsSet(LS_BEST, score);
  if (maxCombo > lsGet(LS_BEST_COMBO, 0)) lsSet(LS_BEST_COMBO, maxCombo);
  if (Math.round(heat * 100) > lsGet(LS_BEST_HEAT, 0)) lsSet(LS_BEST_HEAT, Math.round(heat * 100));
}

// ── Input ─────────────────────────────────────────────────────────────────────
function handleInput(clientX, clientY) {
  initAudio();

  if (state === 'start') {
    state = 'playing';
    resetGame();
    return;
  }

  if (state === 'gameover') {
    // Check share button
    if (shareBtnRect) {
      const r = wrap.getBoundingClientRect();
      const lx = clientX - r.left, ly = clientY - r.top;
      const b = shareBtnRect;
      if (lx >= b.x && lx <= b.x + b.w && ly >= b.y && ly <= b.y + b.h) {
        doShare(); return;
      }
    }
    if (gameOverT > 850) {
      state = 'playing';
      resetGame();
    }
    return;
  }

  // Playing
  const now = performance.now();
  const win = BEAT_WIN * beatMs * (inSurge ? 0.72 : 1);

  if (!beatPending) {
    // Tapped between beats — small early penalty unless near last beat
    const sinceLastBeat = now - lastBeatAt;
    if (sinceLastBeat > win * 0.5) applyEarly();
    return;
  }
  if (tapConsumed) return;

  const elapsed = now - beatPendingAt;

  if (elapsed < beatMs * 0.08) {
    applyEarly(); return;
  }
  if (elapsed <= win * 0.55) {
    applyHit(0);           // ok (early side)
  } else if (elapsed <= win) {
    applyHit(1);           // perfect
  } else if (elapsed <= win * 1.3) {
    applyHit(2);           // good (late side)
  } else {
    // Very late — treat as miss
    applyMiss();
  }
}

canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  handleInput(e.clientX, e.clientY);
}, { passive: false });

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    handleInput(W / 2, H / 2);
  }
});

// ── Share ─────────────────────────────────────────────────────────────────────
function doShare() {
  const url  = `https://balinti.github.io/steam-pulse/?ref=share&score=${score}&heat=${Math.round(heat * 100)}`;
  const text = `I scored ${score} in Steam Pulse! Can you beat me?`;
  if (navigator.share) {
    navigator.share({ title: 'Steam Pulse', text, url }).catch(() => {});
  } else {
    try {
      navigator.clipboard.writeText(url + '\n' + text).then(() => {
        copiedMsg = true; copiedTimer = 2000;
      });
    } catch(e) {
      window.prompt('Copy challenge link:', url);
    }
  }
}

// ── Draw: Background ──────────────────────────────────────────────────────────
function drawBG() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, `hsl(${hue},38%,6%)`);
  grad.addColorStop(1, `hsl(${(hue + 28) % 360},48%,10%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,190,80,0.045)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 42) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 42) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Surge tint
  if (inSurge && state === 'playing') {
    const p = Math.sin(Date.now() / 140) * 0.5 + 0.5;
    ctx.fillStyle = `rgba(255,40,0,${0.03 + p * 0.04})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ── Draw: Pipes ───────────────────────────────────────────────────────────────
function drawPipes() {
  const py = H * 0.56, ph = 18;
  const grad = ctx.createLinearGradient(0, py - ph / 2, 0, py + ph / 2);
  grad.addColorStop(0, '#7a5430');
  grad.addColorStop(0.45, '#d4a040');
  grad.addColorStop(1, '#4a2e10');
  ctx.fillStyle = grad;
  roundRect(10, py - ph / 2, W - 20, ph, 8);
  ctx.fill();
  ctx.strokeStyle = '#e8b848';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Rivets
  ctx.fillStyle = '#7a5018';
  for (let x = 28; x < W - 16; x += 38) {
    ctx.beginPath(); ctx.arc(x, py, 3.5, 0, Math.PI * 2); ctx.fill();
  }
}

// ── Draw: Valves ──────────────────────────────────────────────────────────────
function drawValves(totalMs) {
  for (let i = 0; i < NUM_VALVES; i++) {
    const vp  = valvePos(i);
    const vx  = vp.x, vy = vp.y;
    const lit = (i === activeValve) ? valveFlash : 0;
    const vh  = (hue + i * 65) % 360;
    const rotSpeed = lit > 0.1 ? 2.5 : 0.5;
    const rot = totalMs * 0.001 * rotSpeed;

    // Glow
    if (lit > 0.1) {
      const gw = ctx.createRadialGradient(vx, vy - 58, 0, vx, vy - 58, 68);
      gw.addColorStop(0, `hsla(${vh},100%,72%,${lit * 0.55})`);
      gw.addColorStop(1, 'transparent');
      ctx.fillStyle = gw;
      ctx.beginPath(); ctx.arc(vx, vy - 58, 68, 0, Math.PI * 2); ctx.fill();
    }

    // Stem
    ctx.fillStyle = '#603820';
    ctx.strokeStyle = '#d8a038';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.rect(vx - 7, vy - 62, 14, 28);
    ctx.fill(); ctx.stroke();

    // Wheel
    ctx.save();
    ctx.translate(vx, vy - 62);
    ctx.rotate(rot);
    const wc = lit > 0.1 ? `hsl(${vh},100%,${55 + lit * 28}%)` : '#8a6028';
    ctx.strokeStyle = wc; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI * 2); ctx.stroke();
    for (let k = 0; k < 4; k++) {
      const a = (k / 4) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * 22, Math.sin(a) * 22);
      ctx.stroke();
    }
    ctx.fillStyle = lit > 0.1 ? `hsl(${vh},100%,80%)` : '#5a3818';
    ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    // Pressure mini-gauge arc
    ctx.strokeStyle = '#3a2010';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(vx, vy + 18, 11, Math.PI, 0); ctx.stroke();
    if (lit > 0 && heat > 0) {
      ctx.strokeStyle = `hsl(${30 - heat * 28},100%,58%)`;
      ctx.lineWidth = 3;
      ctx.beginPath(); ctx.arc(vx, vy + 18, 11, Math.PI, Math.PI + heat * Math.PI); ctx.stroke();
    }
  }
}

// ── Draw: Rings ───────────────────────────────────────────────────────────────
function drawRings(dt) {
  for (let i = rings.length - 1; i >= 0; i--) {
    const rg = rings[i];
    rg.r += dt * 0.065;
    rg.alpha = Math.max(0, 1 - rg.r / 88);
    if (rg.alpha <= 0) { rings.splice(i, 1); continue; }
    ctx.strokeStyle = `hsla(${hue},100%,70%,${rg.alpha})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI * 2); ctx.stroke();
  }
}

// ── Draw: Particles ───────────────────────────────────────────────────────────
function drawParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt * 0.001;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    const t = p.life / p.maxLife;

    if (p.kind === 'steam') {
      const sz = p.sz * (1 + (1 - t) * 1.8);
      ctx.fillStyle = `hsla(${p.hue},55%,78%,${t * 0.38})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, sz, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = `hsla(${p.hue},100%,65%,${t})`;
      if (p.kind === 'sq') {
        ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
      } else {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * t, 0, Math.PI * 2); ctx.fill();
      }
    }
  }
}

// ── Draw: Pressure gauge ──────────────────────────────────────────────────────
function drawPressureGauge() {
  const gx = 10, gy = 10, gw = W - 20, gh = 15, r = 6;
  roundRect(gx, gy, gw, gh, r);
  ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,190,80,0.3)'; ctx.lineWidth = 1; ctx.stroke();

  if (pressure > 0) {
    const fw = (gw - 4) * pressure;
    const ph = 90 - pressure * 90;
    const fg = ctx.createLinearGradient(gx + 2, 0, gx + 2 + fw, 0);
    fg.addColorStop(0, `hsl(${ph},100%,38%)`);
    fg.addColorStop(1, `hsl(${ph},100%,62%)`);
    roundRect(gx + 2, gy + 2, fw, gh - 4, r - 1);
    ctx.fillStyle = fg; ctx.fill();
    if (pressure > 0.65) {
      const p2 = Math.sin(Date.now() / 95) * 0.5 + 0.5;
      roundRect(gx + 2, gy + 2, fw, gh - 4, r - 1);
      ctx.fillStyle = `rgba(255,80,0,${p2 * 0.35})`; ctx.fill();
    }
  }
  txt('PRESSURE', W / 2, gy + gh / 2 + 0.5, 7.5, 'rgba(255,195,90,0.65)');
}

// ── Draw: Heat bar ────────────────────────────────────────────────────────────
function drawHeatBar() {
  const bx = 10, by = 30, bw = W - 20, bh = 10, r = 4;
  roundRect(bx, by, bw, bh, r);
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fill();

  if (heat > 0) {
    const fw = (bw - 4) * heat;
    const hg = ctx.createLinearGradient(bx + 2, 0, bx + 2 + fw, 0);
    hg.addColorStop(0, `hsl(${hue},80%,38%)`);
    hg.addColorStop(1, `hsl(${(hue + 55) % 360},100%,68%)`);
    roundRect(bx + 2, by + 2, fw, bh - 4, r - 1);
    ctx.fillStyle = hg; ctx.fill();
  }
  const mult = 1 + Math.floor(heat * 4);
  txt(`HEAT  x${mult}`, W / 2, by + bh / 2 + 0.5, 7, 'rgba(255,190,80,0.6)');
}

// ── Draw: HUD ─────────────────────────────────────────────────────────────────
function drawHUD() {
  txt(String(score), W / 2, H * 0.16, 54, `hsl(${hue},100%,76%)`, 'center', true);
  if (combo > 1) {
    txt(`COMBO x${combo}`, W / 2, H * 0.235, 15, `hsl(${(hue + 60) % 360},100%,70%)`, 'center', true);
  }
  const best = lsGet(LS_BEST, 0);
  if (best > 0) {
    txt(`BEST ${best}`, W - 10, 52, 10, 'rgba(255,190,80,0.5)', 'right');
  }
  if (inSurge) {
    const p = Math.sin(Date.now() / 115) * 0.5 + 0.5;
    txt('!! STEAM SURGE !!', W / 2, H * 0.42, 18, `rgba(255,${90 + p * 120},0,${0.82 + p * 0.18})`, 'center', true);
  }
}

// ── Draw: tap flash ───────────────────────────────────────────────────────────
function drawTapFlash() {
  if (tapFlash <= 0) return;
  const rg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.8);
  rg.addColorStop(0, `hsla(${hue},100%,80%,${tapFlash * 0.14})`);
  rg.addColorStop(1, 'transparent');
  ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);
}

// ── Draw: Start screen ────────────────────────────────────────────────────────
function drawStart() {
  txt('STEAM', W / 2, H * 0.29, 66, `hsl(${hue},100%,74%)`, 'center', true);
  txt('PULSE', W / 2, H * 0.40, 66, `hsl(${(hue + 42) % 360},100%,64%)`, 'center', true);
  txt('OVERPRESSURE', W / 2, H * 0.50, 13, 'rgba(255,195,90,0.65)');

  const p = Math.sin(Date.now() / 490) * 0.4 + 0.6;
  txt('TAP TO START', W / 2, H * 0.635, 21, `rgba(255,215,140,${p})`, 'center', true);

  if (friendScore > 0) {
    roundRect(W / 2 - 145, H * 0.705, 290, 36, 8);
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fill();
    ctx.strokeStyle = `hsl(${hue},75%,48%)`; ctx.lineWidth = 1.5; ctx.stroke();
    txt(`Friend score: ${friendScore} — Beat it!`, W / 2, H * 0.705 + 18, 13, `hsl(${(hue + 58) % 360},100%,72%)`);
  }
  txt('SPACE / ENTER / TAP', W / 2, H * 0.82, 10.5, 'rgba(255,190,80,0.38)');
}

// ── Draw: Game Over screen ────────────────────────────────────────────────────
function drawGameOver() {
  ctx.fillStyle = `rgba(0,0,0,${Math.min(0.76, gameOverT / 750)})`;
  ctx.fillRect(0, 0, W, H);

  if (gameOverT < 250) return;

  const a1 = Math.min(1, (gameOverT - 250) / 280);

  // BOOM flash
  if (gameOverT < 750) {
    const ba = Math.max(0, 1 - (gameOverT - 250) / 500) * a1;
    ctx.save(); ctx.globalAlpha = ba;
    txt('BOOM!', W / 2, H / 2, 96, '#ff4400', 'center', true);
    ctx.restore();
  }

  if (gameOverT < 550) return;
  const a2 = Math.min(1, (gameOverT - 550) / 200);
  ctx.save(); ctx.globalAlpha = a2;

  txt('GAME OVER', W / 2, H * 0.29, 36, `hsl(${hue},100%,64%)`, 'center', true);
  txt('SCORE', W / 2, H * 0.39, 13, 'rgba(255,190,80,0.62)');
  txt(String(score), W / 2, H * 0.465, 58, `hsl(${hue},100%,74%)`, 'center', true);

  const best = lsGet(LS_BEST, 0);
  if (score >= best && score > 0) {
    const pp = Math.sin(Date.now() / 280) * 0.5 + 0.5;
    txt('NEW BEST!', W / 2, H * 0.545, 18, `hsl(60,100%,${62 + pp * 14}%)`, 'center', true);
  } else {
    txt(`BEST  ${best}`, W / 2, H * 0.545, 15, 'rgba(255,190,80,0.58)');
  }
  txt(`MAX COMBO  ${maxCombo}`, W / 2, H * 0.605, 12.5, `rgba(255,${140 + Math.round(heat * 100)},50,0.72)`);

  if (gameOverT > 850) {
    const pp = Math.sin(Date.now() / 440) * 0.4 + 0.6;
    txt('TAP TO RETRY', W / 2, H * 0.705, 20, `rgba(255,215,140,${pp})`, 'center', true);
  }

  // Share button
  const bw = 168, bh = 38;
  const bx = W / 2 - bw / 2, by = H * 0.775;
  shareBtnRect = { x: bx, y: by, w: bw, h: bh };
  roundRect(bx, by, bw, bh, 10);
  ctx.fillStyle = `hsl(${hue},75%,26%)`; ctx.fill();
  ctx.strokeStyle = `hsl(${hue},100%,58%)`; ctx.lineWidth = 2; ctx.stroke();

  const label = copiedMsg ? 'LINK COPIED!' : 'SHARE / CHALLENGE';
  txt(label, W / 2, by + bh / 2, 12, copiedMsg ? '#aaffaa' : `hsl(${hue},100%,80%)`);

  ctx.restore();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
let lastTime = performance.now();
let totalMs  = 0;

function loop(now) {
  requestAnimationFrame(loop);

  const dt = Math.min(now - lastTime, 80);
  lastTime = now;
  totalMs += dt;

  // Decay
  valveFlash = Math.max(0, valveFlash - dt * 0.0028);
  tapFlash   = Math.max(0, tapFlash   - dt * 0.0045);
  heat       = Math.max(0, heat       - dt * 0.000085);

  if (copiedTimer > 0) { copiedTimer -= dt; if (copiedTimer <= 0) copiedMsg = false; }

  // Shake
  if (shakeAmt > 0) {
    shakeAmt *= 0.87;
    shakeX = (Math.random() - 0.5) * shakeAmt;
    shakeY = (Math.random() - 0.5) * shakeAmt;
    if (shakeAmt < 0.4) { shakeAmt = 0; shakeX = shakeY = 0; }
  } else { shakeX = shakeY = 0; }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  drawBG();
  drawParticles(dt);

  if (state === 'start') {
    drawPipes();
    drawValves(totalMs);
    drawStart();
  } else if (state === 'playing') {
    // Beat scheduler
    if (now >= nextBeatAt) onBeat(now);

    // Auto-expire beat (late miss) between scheduled beats
    if (beatPending && !tapConsumed) {
      const elapsed = now - beatPendingAt;
      const win = BEAT_WIN * beatMs * (inSurge ? 0.72 : 1);
      if (elapsed > win * 1.6) {
        applyMiss();
      }
    }

    drawPipes();
    drawValves(totalMs);
    drawRings(dt);
    drawPressureGauge();
    drawHeatBar();
    drawHUD();
    drawTapFlash();

    // Game over flash overlay
    if (goFlash > 0) {
      ctx.fillStyle = `rgba(255,80,0,${goFlash})`;
      ctx.fillRect(0, 0, W, H);
      goFlash = Math.max(0, goFlash - dt * 0.005);
    }
  } else if (state === 'gameover') {
    gameOverT += dt;
    drawPipes();
    drawValves(totalMs);
    drawGameOver();
  }

  ctx.restore();
}

requestAnimationFrame(loop);

})();
</script>
